<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.subtitle | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body class="layout-{{ page.layout | default: 'default' }} page-{{ page.title | default: site.title | slugify }}">
    <header class="site-header">
      <div class="shell masthead">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}#gis">GIS</a>
          <a href="{{ '/' | relative_url }}#ai">AI</a>
          <a href="{{ '/' | relative_url }}#data-science">Data</a>
          <a href="{{ '/' | relative_url }}#nlp">NLP</a>
        </nav>
      </div>
    </header>

    <main class="shell site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <p class="footer-mark">Data-Driven Design</p>
        <p class="footer-copy">Public tutorials for design students learning GIS, AI, data visualization, and computational research methods.</p>
      </div>
    </footer>
  </body>
</html>

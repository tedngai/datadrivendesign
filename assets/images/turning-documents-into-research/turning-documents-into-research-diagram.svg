</defs>
<text x="90" y="120" class="title"><tspan x="90" dy="0">TURNING DOCUMENTS INTO RESEARCH</tspan></text><text x="92" y="165" class="body"><tspan x="92" dy="0">From a folder of PDFs to contextual summaries and retrieval-</tspan><tspan x="92" dy="32">ready knowledge</tspan></text><rect x="120" y="310" width="220" height="280" fill="none" stroke="#111111" stroke-width="2"/><line x1="148" y1="380" x2="302" y2="380" class="line"/><line x1="148" y1="430" x2="302" y2="430" class="line"/><line x1="148" y1="480" x2="302" y2="480" class="line"/><rect x="145" y="292" width="220" height="280" fill="none" stroke="#111111" stroke-width="2"/><line x1="173" y1="362" x2="327" y2="362" class="line"/><line x1="173" y1="412" x2="327" y2="412" class="line"/><line x1="173" y1="462" x2="327" y2="462" class="line"/><rect x="170" y="274" width="220" height="280" fill="none" stroke="#111111" stroke-width="2"/><line x1="198" y1="344" x2="352" y2="344" class="line"/><line x1="198" y1="394" x2="352" y2="394" class="line"/><line x1="198" y1="444" x2="352" y2="444" class="line"/><text x="140" y="650" class="small"><tspan x="140" dy="0">source PDF archive</tspan></text><line x1="420" y1="430" x2="610" y2="430" class="arrow"/><rect x="660" y="270" width="330" height="320" class="box"/><text x="690" y="320" class="label"><tspan x="690" dy="0">Contextual summary</tspan></text><text x="690" y="380" class="body"><tspan x="690" dy="0">This section explains how</tspan><tspan x="690" dy="30">the report links flood</tspan><tspan x="690" dy="30">adaptation to transit</tspan><tspan x="690" dy="30">access, infrastructure</tspan><tspan x="690" dy="30">maintenance, and phased</tspan><tspan x="690" dy="30">investment.</tspan></text><line x1="1010" y1="430" x2="1170" y2="430" class="arrow"/><rect x="1210" y="270" width="270" height="320" class="box"/><text x="1240" y="320" class="label"><tspan x="1240" dy="0">Retriever</tspan></text><text x="1240" y="385" class="body"><tspan x="1240" dy="0">query -&gt; relevant</tspan><tspan x="1240" dy="30">chunks -&gt; cited</tspan><tspan x="1240" dy="30">answer</tspan></text><text x="690" y="650" class="small accent"><tspan x="690" dy="0">extract -&gt; summarize -&gt; embed -&gt;</tspan><tspan x="690" dy="24">search</tspan></text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Tutorial illustration">
<rect width="1600" height="900" fill="#f3f0e9"/>
<style>
text { font-family: Helvetica, Arial, sans-serif; fill: #111111; }
.small { font-size: 22px; fill: #66615a; }
.body { font-size: 26px; fill: #66615a; }
.title { font-size: 58px; font-weight: 700; letter-spacing: -1px; }
.label { font-size: 24px; font-weight: 700; }
.accent { fill: #b6421d; }
.line { stroke: #171310; stroke-opacity: 0.2; stroke-width: 2; }
.box { fill: none; stroke: #111111; stroke-width: 2; }
.arrow { stroke: #b6421d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.softbox { fill: none; stroke: #171310; stroke-opacity: 0.5; stroke-width: 1.5; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#b6421d" />
  </marker>
</defs>
<text x="90" y="120" class="title"><tspan x="90" dy="0">MAKING SPEECH SEARCHABLE</tspan></text><text x="92" y="165" class="body"><tspan x="92" dy="0">Audio becomes transcript, transcript becomes research</tspan><tspan x="92" dy="32">material</tspan></text><rect x="120" y="290" rx="18" ry="18" width="220" height="320" fill="none" stroke="#111111" stroke-width="2"/><circle cx="230" cy="360" r="58" fill="none" stroke="#b6421d" stroke-width="6" stroke-opacity="0.8"/><rect x="220" y="425" width="20" height="85" fill="#b6421d" fill-opacity="0.8"/><text x="145" y="575" class="small"><tspan x="145" dy="0">source audio /</tspan><tspan x="145" dy="24">lecture / interview</tspan></text><line x1="360" y1="450" x2="620" y2="450" class="arrow"/><rect x="690" y="250" width="760" height="430" class="box"/><line x1="740" y1="320" x2="1390" y2="320" class="line"/><line x1="740" y1="380" x2="1390" y2="380" class="line"/><line x1="740" y1="440" x2="1390" y2="440" class="line"/><line x1="740" y1="500" x2="1390" y2="500" class="line"/><line x1="740" y1="560" x2="1390" y2="560" class="line"/><text x="740" y="305" class="label"><tspan x="740" dy="0">Transcript</tspan></text><text x="740" y="360" class="body"><tspan x="740" dy="0">...climate adaptation is no longer optional for</tspan><tspan x="740" dy="30">cities...</tspan></text><text x="740" y="420" class="body"><tspan x="740" dy="0">...public investment has to address heat, flooding,</tspan><tspan x="740" dy="30">and access...</tspan></text><text x="740" y="480" class="body"><tspan x="740" dy="0">...the challenge is translating long-term risk into</tspan><tspan x="740" dy="30">visible design...</tspan></text><text x="740" y="610" class="small"><tspan x="740" dy="0">download -&gt; transcribe -&gt; save -&gt;</tspan><tspan x="740" dy="24">search -&gt; analyze</tspan></text>
</svg>